<!doctype html>
<html><head><meta charset="utf-8"><title>Radii + spacing</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Radii</div>
  <div class="row">
    <div style="flex:1; height:48px; background:var(--control-fill-secondary); border:1px solid var(--stroke-default); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-secondary); font-family:var(--font-mono);">4px — control</div>
    <div style="flex:1; height:48px; background:var(--control-fill-secondary); border:1px solid var(--stroke-default); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--text-secondary); font-family:var(--font-mono);">8px — overlay</div>
  </div>
  <div class="mini-label" style="margin-top:4px;">Spacing — 4px grid</div>
  <div style="display:flex; gap:4px; align-items:flex-end;">
    <div style="width:4px; height:4px; background:#0078D4;"></div>
    <div style="width:8px; height:8px; background:#0078D4;"></div>
    <div style="width:12px; height:12px; background:#0078D4;"></div>
    <div style="width:16px; height:16px; background:#0078D4;"></div>
    <div style="width:20px; height:20px; background:#0078D4;"></div>
    <div style="width:24px; height:24px; background:#0078D4;"></div>
    <div style="width:32px; height:32px; background:#0078D4;"></div>
    <div style="width:40px; height:40px; background:#0078D4;"></div>
  </div>
  <div style="display:flex; gap:4px; font-family:var(--font-mono); font-size:10px; color:var(--text-tertiary);">
    <span style="width:4px;">4</span><span style="width:8px;">8</span><span style="width:12px;">12</span><span style="width:16px;">16</span><span style="width:20px;">20</span><span style="width:24px;">24</span><span style="width:32px;">32</span><span style="width:40px;">40</span>
  </div>
</div>
</body></html>
