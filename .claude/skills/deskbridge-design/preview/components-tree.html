<!doctype html>
<html><head><meta charset="utf-8"><title>Tree rows</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Tree rows — selected (accent stripe) · hover · normal</div>
  <div style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:4px; padding:4px;">
    <!-- expanded group -->
    <div style="height:28px; display:flex; align-items:center; padding:0 8px; gap:6px;">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 1l5 5-5 5z" fill="rgba(255,255,255,0.54)" transform="rotate(90 6 6)"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M3 7h6l2 2h10v10H3z"/><path d="M3 9h18"/></svg>
      <span style="font-size:14px; font-weight:600;">Production</span>
    </div>
    <!-- selected connection -->
    <div style="position:relative; height:28px; display:flex; align-items:center; padding:0 8px 0 27px; gap:6px; background:rgba(0,120,212,0.35); border-radius:4px;">
      <div style="position:absolute; left:2px; top:50%; transform:translateY(-50%); width:2px; height:16px; background:#60CDFF; border-radius:1px;"></div>
      <svg width="12" height="12"></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 22h8M12 18v4"/></svg>
      <span style="font-size:14px;">srv-prod-01</span>
    </div>
    <!-- hover -->
    <div style="height:28px; display:flex; align-items:center; padding:0 8px 0 27px; gap:6px; background:rgba(255,255,255,0.04); border-radius:4px;">
      <svg width="12" height="12"></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 22h8M12 18v4"/></svg>
      <span style="font-size:14px;">srv-prod-02</span>
    </div>
    <!-- normal -->
    <div style="height:28px; display:flex; align-items:center; padding:0 8px 0 27px; gap:6px;">
      <svg width="12" height="12"></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 22h8M12 18v4"/></svg>
      <span style="font-size:14px;">db-prod-eu</span>
    </div>
    <!-- collapsed group -->
    <div style="height:28px; display:flex; align-items:center; padding:0 8px; gap:6px;">
      <svg width="12" height="12" viewBox="0 0 12 12"><path d="M3 1l5 5-5 5z" fill="rgba(255,255,255,0.54)"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span style="font-size:14px; font-weight:600;">Staging</span>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="2" style="margin-left:4px;"><path d="M15 7a4 4 0 0 1 0 8l-5 5-3-3 5-5a4 4 0 0 1 3-5z"/></svg>
    </div>
  </div>
</div>
</body></html>
