<!doctype html>
<html><head><meta charset="utf-8"><title>Neutrals</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Neutral surfaces — dark theme (on Mica)</div>
  <div class="row">
    <div class="swatch" style="background:#202020;"><span class="name">App Bg</span><span class="hex">#202020</span></div>
    <div class="swatch" style="background:rgba(255,255,255,0.06);"><span class="name">Ctrl Fill Default</span><span class="hex">6% white</span></div>
    <div class="swatch" style="background:rgba(255,255,255,0.08);"><span class="name">Ctrl Fill Secondary</span><span class="hex">8% white</span></div>
    <div class="swatch" style="background:rgba(255,255,255,0.04);"><span class="name">Subtle Fill</span><span class="hex">4% white</span></div>
    <div class="swatch" style="background:#1E1E1E;"><span class="name">Input Active</span><span class="hex">#1E1E1E</span></div>
  </div>
  <div class="row">
    <div class="swatch" style="background:transparent; border:1px solid rgba(255,255,255,0.08);"><span class="name">Stroke Default</span><span class="hex">8% white</span></div>
    <div class="swatch" style="background:transparent; border:1px solid rgba(255,255,255,0.07);"><span class="name">Stroke Secondary</span><span class="hex">7% white</span></div>
    <div class="swatch" style="background:transparent; border:1px solid rgba(117,117,117,0.4);"><span class="name">Stroke Surface</span><span class="hex">40% grey</span></div>
  </div>
</div>
</body></html>
