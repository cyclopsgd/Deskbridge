<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Deskbridge semantic brushes (App.xaml custom resources)</div>
  <div class="row">
    <div class="swatch" style="background:#F44747;"><span class="name">Error</span><span class="hex">#F44747</span></div>
    <div class="swatch" style="background:#FFCC02;"><span class="name" style="color:#000;">Warning</span><span class="hex" style="color:#000;">#FFCC02</span></div>
    <div class="swatch" style="background:#89D185;"><span class="name" style="color:#000;">Success</span><span class="hex" style="color:#000;">#89D185</span></div>
  </div>
  <div class="row" style="margin-top:4px;">
    <div style="display:flex; gap:16px; align-items:center; padding:10px 12px; background:rgba(255,255,255,0.04); border-radius:4px; flex:1;">
      <span style="width:8px; height:8px; border-radius:50%; background:#F44747;"></span><span style="font-size:12px; color:var(--text-secondary);">error dot — failed tab</span>
      <span style="width:8px; height:8px; border-radius:50%; background:#FFCC02; margin-left:24px;"></span><span style="font-size:12px; color:var(--text-secondary);">amber — reconnecting</span>
      <span style="width:8px; height:8px; border-radius:50%; background:#89D185; margin-left:24px;"></span><span style="font-size:12px; color:var(--text-secondary);">success</span>
    </div>
  </div>
</div>
</body></html>
