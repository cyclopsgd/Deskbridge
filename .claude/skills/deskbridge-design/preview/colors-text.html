<!doctype html>
<html><head><meta charset="utf-8"><title>Text colors</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Text fill tokens — dark theme</div>
  <div style="display:grid; grid-template-columns: 180px 1fr; gap:6px 16px; align-items:center;">
    <span style="color:#fff; font-size:14px;">Primary text</span><span style="font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary);">#FFFFFF — body, headings, selected</span>
    <span style="color:rgba(255,255,255,0.786); font-size:14px;">Secondary text</span><span style="font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary);">rgba(255,255,255,.786) — labels, inactive tabs</span>
    <span style="color:rgba(255,255,255,0.544); font-size:14px;">Tertiary text</span><span style="font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary);">rgba(255,255,255,.544) — placeholders, captions</span>
    <span style="color:rgba(255,255,255,0.363); font-size:14px;">Disabled text</span><span style="font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary);">rgba(255,255,255,.363)</span>
    <span style="color:#fff; background:#0078D4; padding:2px 8px; font-size:14px; border-radius:4px;">On accent</span><span style="font-family:var(--font-mono); font-size:11px; color:var(--text-tertiary);">#FFFFFF on SystemAccentColorPrimary</span>
  </div>
</div>
</body></html>
