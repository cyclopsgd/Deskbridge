<!doctype html>
<html><head><meta charset="utf-8"><title>Command palette</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Command palette — Ctrl+Shift+P</div>
  <div style="width:460px; margin:0 auto; background:rgba(40,40,40,0.98); border:1px solid rgba(255,255,255,0.1); border-radius:8px; box-shadow:0 12px 40px rgba(0,0,0,0.55); overflow:hidden;">
    <div style="padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; gap:8px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.54)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input style="flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:14px; font-family:inherit;" value="prod" />
    </div>
    <div style="padding:4px 0;">
      <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:8px; background:rgba(96,205,255,0.12);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="2" y="4" width="20" height="14" rx="2"/></svg>
        <span style="font-size:14px;">srv-<mark style="background:transparent; color:#60CDFF; font-weight:600;">prod</mark>-01</span>
        <span style="margin-left:auto; font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">Production</span>
      </div>
      <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="2" y="4" width="20" height="14" rx="2"/></svg>
        <span style="font-size:14px;">db-<mark style="background:transparent; color:#60CDFF; font-weight:600;">prod</mark>-eu</span>
        <span style="margin-left:auto; font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">Production</span>
      </div>
      <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span style="font-size:14px;">Search connections: <mark style="background:transparent; color:#60CDFF; font-weight:600;">prod</mark></span>
      </div>
    </div>
  </div>
</div>
</body></html>
