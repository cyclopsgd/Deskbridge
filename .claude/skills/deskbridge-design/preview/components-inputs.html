<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Inputs — ui:TextBox, ui:PasswordBox, ComboBox, ToggleSwitch</div>
  <div style="display:flex; gap:10px; align-items:center;">
    <div style="flex:1; height:32px; background:#1e1e1e; border:1px solid rgba(255,255,255,0.54); border-radius:4px; display:flex; align-items:center; padding:0 8px; gap:6px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.54)" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span style="color:rgba(255,255,255,0.54); font-size:14px;">Filter connections…</span>
    </div>
    <div style="flex:1; height:32px; background:#1e1e1e; border:1px solid #60CDFF; border-radius:4px; display:flex; align-items:center; padding:0 8px;">
      <span style="color:#fff; font-size:14px;">srv-prod-01</span><span style="width:1px; height:14px; background:#fff; margin-left:2px; animation:blink 1s infinite;"></span>
    </div>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <div style="flex:1; height:32px; background:#1e1e1e; border:1px solid rgba(255,255,255,0.08); border-radius:4px; display:flex; align-items:center; padding:0 8px; justify-content:space-between;">
      <span style="color:#fff; font-size:14px; font-family:var(--font-mono);">•••••••••••</span>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.54)" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div style="flex:1; height:32px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.08); border-radius:4px; display:flex; align-items:center; padding:0 8px; justify-content:space-between;">
      <span style="color:#fff; font-size:14px;">Stored</span>
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 3l4 4 4-4" stroke="#fff" stroke-width="1.5" fill="none"/></svg>
    </div>
  </div>
  <div style="display:flex; gap:16px; align-items:center;">
    <!-- toggle on -->
    <div style="width:40px; height:20px; background:#4CC2FF; border-radius:999px; padding:2px; display:flex; box-sizing:border-box; justify-content:flex-end;">
      <div style="width:16px; height:16px; border-radius:50%; background:#000;"></div>
    </div>
    <span style="font-size:14px;">Require password/PIN</span>
    <!-- toggle off -->
    <div style="width:40px; height:20px; background:transparent; border:1px solid rgba(255,255,255,0.54); border-radius:999px; padding:2px; display:flex; box-sizing:border-box; margin-left:24px;">
      <div style="width:14px; height:14px; border-radius:50%; background:rgba(255,255,255,0.78);"></div>
    </div>
    <span style="font-size:14px; color:var(--text-secondary);">Lock on minimise</span>
  </div>
</div>
</body></html>
