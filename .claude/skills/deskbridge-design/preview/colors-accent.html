<!doctype html>
<html><head><meta charset="utf-8"><title>Accent</title><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #1e1e1e; }
  .vs { font-family: var(--font-mono); font-size: 12px; }
  .vs-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; color: var(--text-tertiary);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    font-family: var(--font-sans); font-weight: 600;
    border-bottom: 1px solid #2a2a2a;
  }
  .vs-row {
    display: grid;
    grid-template-columns: 28px 1fr 92px 64px;
    align-items: center;
    height: 30px; padding: 0 14px; gap: 12px;
    border-bottom: 1px solid #262626;
    color: var(--text-primary);
  }
  .vs-row:last-child { border-bottom: none; }
  .vs-row:hover { background: #2a2d2e; }
  .chip { width: 14px; height: 14px; border: 1px solid rgba(255,255,255,0.10); }
  .token { color: #9cdcfe; }     /* VS Code variable blue */
  .alias { color: #6a6a6a; }
  .hex   { color: #ce9178; text-align: right; }   /* VS Code string orange */
</style>
</head>
<body>
<div class="vs">
  <div class="vs-header">
    <span>Accent · 6 swatches</span>
    <span style="color:var(--accent-primary); font-family:var(--font-mono); text-transform:none; letter-spacing:0;">● inherits OS accent</span>
  </div>
  <div class="vs-row"><div class="chip" style="background:#99EBFF;"></div><span class="token">--accent-text</span><span class="alias">light-3</span><span class="hex">#99EBFF</span></div>
  <div class="vs-row"><div class="chip" style="background:#60CDFF;"></div><span class="token">--accent-primary</span><span class="alias">light-2</span><span class="hex">#60CDFF</span></div>
  <div class="vs-row"><div class="chip" style="background:#4CC2FF;"></div><span class="token">--accent-fill-default</span><span class="alias">light-1</span><span class="hex">#4CC2FF</span></div>
  <div class="vs-row"><div class="chip" style="background:#0078D4;"></div><span class="token">--accent-secondary</span><span class="alias">base</span><span class="hex">#0078D4</span></div>
  <div class="vs-row"><div class="chip" style="background:#005EB7;"></div><span class="token">--accent-tertiary</span><span class="alias">dark-1</span><span class="hex">#005EB7</span></div>
  <div class="vs-row"><div class="chip" style="background:#003E92;"></div><span class="token">--accent-dark-2</span><span class="alias">dark-2</span><span class="hex">#003E92</span></div>
</div>
</body></html>
