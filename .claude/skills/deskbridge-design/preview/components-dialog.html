<!doctype html>
<html><head><meta charset="utf-8"><title>Dialog</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">ContentDialog — standard Fluent pattern</div>
  <div style="width:420px; margin:0 auto; background:#2b2b2b; border:1px solid rgba(255,255,255,0.1); border-radius:8px; overflow:hidden; box-shadow:0 12px 40px rgba(0,0,0,0.55);">
    <div style="padding:20px 24px 12px;">
      <div style="font-size:20px; font-weight:600; margin-bottom:8px;">Save changes?</div>
      <div style="font-size:14px; color:var(--text-secondary);">You have unsaved changes to srv-prod-01. Save them before switching connections?</div>
    </div>
    <div style="padding:12px 24px 20px; display:flex; gap:8px; justify-content:flex-end;">
      <button style="background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.08); border-radius:4px; padding:6px 16px; font-size:14px; font-family:inherit;">Cancel</button>
      <button style="background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.08); border-radius:4px; padding:6px 16px; font-size:14px; font-family:inherit;">Don't Save</button>
      <button style="background:#4CC2FF; color:#000; border:1px solid transparent; border-radius:4px; padding:6px 16px; font-size:14px; font-weight:600; font-family:inherit;">Save</button>
    </div>
  </div>
</div>
</body></html>
