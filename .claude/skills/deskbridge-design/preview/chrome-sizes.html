<!doctype html>
<html><head><meta charset="utf-8"><title>Chrome sizes</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Fixed chrome sizes — MainWindow.xaml</div>
  <div style="display:grid; grid-template-columns: 1fr auto; gap:4px 16px; font-size:12px;">
    <span>TitleBar height</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">32px</span>
    <span>Icon rail width</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">36px</span>
    <span>Slide-out panel width</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">240px</span>
    <span>Tab bar height</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">30px</span>
    <span>Status bar height</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">22px</span>
    <span>Row height (tree, menu)</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">28px min</span>
    <span>Status dot</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">8px</span>
    <span>Selected-tab top border</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">2px accent</span>
    <span>Selected-row left stripe</span><span style="font-family:var(--font-mono); color:var(--text-secondary);">2px × 16px accent</span>
  </div>
</div>
</body></html>
