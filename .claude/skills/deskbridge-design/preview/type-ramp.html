<!doctype html>
<html><head><meta charset="utf-8"><title>Type — ramp</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">WinUI type ramp — Segoe UI Variable (Inter as stand-in)</div>
  <div style="display:grid; grid-template-columns: 56px 1fr auto; gap:4px 16px; align-items:baseline;">
    <span style="font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">28</span>
    <span style="font-size:28px; font-weight:600; line-height:1.2;">Dialog title</span>
    <span style="font-size:11px; color:var(--text-tertiary);">28 · 600</span>

    <span style="font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">20</span>
    <span style="font-size:20px; font-weight:600; line-height:1.2;">Deskbridge</span>
    <span style="font-size:11px; color:var(--text-tertiary);">20 · 600 · empty state</span>

    <span style="font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">16</span>
    <span style="font-size:16px; font-weight:600;">Card title</span>
    <span style="font-size:11px; color:var(--text-tertiary);">16 · 600</span>

    <span style="font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">14</span>
    <span style="font-size:14px;">Body — tree rows, buttons, menus, tabs</span>
    <span style="font-size:11px; color:var(--text-tertiary);">14 · 400 default</span>

    <span style="font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">12</span>
    <span style="font-size:12px; color:var(--text-secondary);">Caption — property labels, status bar</span>
    <span style="font-size:11px; color:var(--text-tertiary);">12 · 400</span>

    <span style="font-size:11px; color:var(--text-tertiary); font-family:var(--font-mono);">11</span>
    <span style="font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-secondary);">Section label</span>
    <span style="font-size:11px; color:var(--text-tertiary);">11 · 600 · uppercase</span>
  </div>
</div>
</body></html>
