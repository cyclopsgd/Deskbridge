<!doctype html>
<html><head><meta charset="utf-8"><title>Menu</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Context menu — connection right-click</div>
  <div style="width:260px; background:rgba(40,40,40,0.98); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:4px 0; box-shadow:0 8px 20px rgba(0,0,0,0.5);">
    <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:10px; background:rgba(96,205,255,0.12);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
      <span style="flex:1; font-size:14px;">Connect</span>
      <span style="font-size:12px; color:var(--text-tertiary); font-family:var(--font-mono);">Enter</span>
    </div>
    <div style="height:1px; background:rgba(255,255,255,0.08); margin:4px 0;"></div>
    <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:10px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M3 21l4-1 13-13-3-3L4 17l-1 4z"/></svg>
      <span style="flex:1; font-size:14px;">Edit</span>
    </div>
    <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:10px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V4h12"/></svg>
      <span style="flex:1; font-size:14px;">Duplicate</span>
    </div>
    <div style="height:1px; background:rgba(255,255,255,0.08); margin:4px 0;"></div>
    <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:10px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
      <span style="flex:1; font-size:14px;">New Connection</span>
      <span style="font-size:12px; color:var(--text-tertiary); font-family:var(--font-mono);">Ctrl+N</span>
    </div>
    <div style="height:1px; background:rgba(255,255,255,0.08); margin:4px 0;"></div>
    <div style="height:32px; padding:0 12px; display:flex; align-items:center; gap:10px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F44747" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
      <span style="flex:1; font-size:14px; color:#F44747;">Delete</span>
      <span style="font-size:12px; color:var(--text-tertiary); font-family:var(--font-mono);">Delete</span>
    </div>
  </div>
</div>
</body></html>
