<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Button appearances — WPF-UI ui:Button</div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button style="background:#4CC2FF; color:#000; border:1px solid transparent; border-radius:4px; padding:6px 12px; font-size:14px; font-weight:600; font-family:inherit;">Primary</button>
    <button style="background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.08); border-radius:4px; padding:6px 12px; font-size:14px; font-family:inherit;">Secondary</button>
    <button style="background:transparent; color:#fff; border:1px solid transparent; border-radius:4px; padding:6px 12px; font-size:14px; font-family:inherit;">Transparent</button>
    <button style="background:#C42B1C; color:#fff; border:1px solid transparent; border-radius:4px; padding:6px 12px; font-size:14px; font-family:inherit;">Danger</button>
    <button style="background:#107C10; color:#fff; border:1px solid transparent; border-radius:4px; padding:6px 12px; font-size:14px; font-family:inherit;">Success</button>
    <button style="background:#9D5D00; color:#fff; border:1px solid transparent; border-radius:4px; padding:6px 12px; font-size:14px; font-family:inherit;">Caution</button>
  </div>
  <div style="font-size:11px; color:var(--text-tertiary);">Padding 12,6 · 14px · SemiBold for Primary · radius 4px</div>
</div>
</body></html>
