<!doctype html>
<html><head><meta charset="utf-8"><title>Toasts</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-root">
  <div class="mini-label">Toasts — Snackbar appearances · 8px radius · drop shadow</div>
  <div style="display:flex; flex-direction:column; gap:8px;">
    <div style="background:rgba(40,40,40,0.95); border:1px solid rgba(137,209,133,0.5); border-left:3px solid #89D185; border-radius:8px; padding:10px 12px; display:flex; gap:10px; align-items:center; box-shadow:0 4px 14px rgba(0,0,0,0.45);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#89D185" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-6"/></svg>
      <div><div style="font-size:14px; font-weight:600;">Saved</div><div style="font-size:12px; color:var(--text-secondary);">Your changes have been saved.</div></div>
    </div>
    <div style="background:rgba(40,40,40,0.95); border:1px solid rgba(255,204,2,0.5); border-left:3px solid #FFCC02; border-radius:8px; padding:10px 12px; display:flex; gap:10px; align-items:center; box-shadow:0 4px 14px rgba(0,0,0,0.45);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFCC02" stroke-width="2"><path d="M12 3l10 18H2z"/><path d="M12 9v5M12 18h.01"/></svg>
      <div><div style="font-size:14px; font-weight:600;">15 session limit reached</div><div style="font-size:12px; color:var(--text-secondary);">Close some before opening more.</div></div>
    </div>
    <div style="background:rgba(40,40,40,0.95); border:1px solid rgba(244,71,71,0.5); border-left:3px solid #F44747; border-radius:8px; padding:10px 12px; display:flex; gap:10px; align-items:center; box-shadow:0 4px 14px rgba(0,0,0,0.45);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F44747" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
      <div><div style="font-size:14px; font-weight:600;">Connection failed</div><div style="font-size:12px; color:var(--text-secondary);">bastion-01 · 0x00000005</div></div>
    </div>
  </div>
</div>
</body></html>
