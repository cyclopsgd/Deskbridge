name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Deskbridge.sln

      - name: Build (Release)
        run: dotnet build Deskbridge.sln --configuration Release --no-restore

      - name: Test (unit + integration, skip UAT + Slow)
        run: dotnet test Deskbridge.sln --configuration Release --no-build --filter "Category!=UAT&Category!=Slow" --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: "**/*.trx"
          retention-days: 14

      - name: Publish (win-x64 self-contained single-file)
        run: dotnet publish src/Deskbridge/Deskbridge.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true --output publish

      - name: Upload Deskbridge exe
        uses: actions/upload-artifact@v4
        with:
          name: Deskbridge-win-x64-${{ github.sha }}
          path: publish/
          retention-days: 30
          if-no-files-found: error
